<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>偉大な科学者クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #e2b04a;
    --accent2: #4a8fe2;
    --accent3: #e24a7a;
    --text: #e8e8f0;
    --text-muted: #8892a4;
    --correct: #3ecf8e;
    --wrong: #e24a4a;
    --radius: 16px;
    --glow: 0 0 30px rgba(226,176,74,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 45%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 20px 16px 40px;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== TITLE SCREEN ===== */
  #title-screen {
    justify-content: center;
    text-align: center;
    gap: 0;
  }

  .title-orbit {
    position: relative;
    width: 160px;
    height: 160px;
    margin: 0 auto 32px;
  }

  .orbit-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid rgba(226,176,74,0.3);
    animation: spin 8s linear infinite;
  }
  .orbit-ring::after {
    content: '⚛';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    color: var(--accent);
    text-shadow: 0 0 12px var(--accent);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .orbit-ring:nth-child(2) {
    inset: 20px;
    border-color: rgba(74,143,226,0.3);
    animation-duration: 5s;
    animation-direction: reverse;
  }
  .orbit-ring:nth-child(2)::after { content: '✦'; font-size: 14px; color: var(--accent2); text-shadow: 0 0 12px var(--accent2); }

  .orbit-core {
    position: absolute;
    inset: 50px;
    background: radial-gradient(circle, rgba(226,176,74,0.3), rgba(226,176,74,0.05));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 40px rgba(226,176,74,0.2);
  }

  .title-main {
    font-family: 'Kaisei Decol', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(226,176,74,0.5);
    letter-spacing: 0.05em;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .title-sub {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .title-info {
    background: var(--surface);
    border: 1px solid rgba(226,176,74,0.2);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 40px;
  }

  .title-info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 14px;
  }
  .title-info-row:last-child { border-bottom: none; }
  .title-info-row span:first-child { color: var(--text-muted); }
  .title-info-row span:last-child { color: var(--accent); font-weight: 700; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #c8922a);
    color: #1a0f00;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(226,176,74,0.4);
    transition: all 0.2s;
    letter-spacing: 0.1em;
  }
  .btn-primary:active { transform: scale(0.96); }

  /* ===== STAGE SELECT ===== */
  .stage-select-section {
    width: 100%;
    max-width: 340px;
    margin-bottom: 24px;
  }
  .stage-select-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
    text-align: center;
  }
  .stage-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .stage-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1.5px solid rgba(226,176,74,0.25);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .stage-cell:active { transform: scale(0.93); }
  .stage-cell.selected {
    border-color: var(--accent);
    background: rgba(226,176,74,0.15);
    box-shadow: 0 0 14px rgba(226,176,74,0.3);
  }
  .stage-cell-num {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stage-cell-label {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 3px;
    letter-spacing: 0.05em;
  }
  .stage-cell.selected .stage-cell-label { color: var(--accent); }
  .stage-select-hint {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 10px;
  }
  .stage-select-hint span { color: var(--accent); font-weight: 700; }

  /* ===== QUIZ SCREEN ===== */
  #quiz-screen { gap: 0; }

  .quiz-header {
    width: 100%;
    max-width: 400px;
    margin-bottom: 20px;
  }

  .stage-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .stage-badge {
    background: rgba(226,176,74,0.15);
    border: 1px solid rgba(226,176,74,0.4);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  .score-display {
    font-size: 14px;
    color: var(--text-muted);
  }
  .score-display span { color: var(--accent); font-weight: 700; }

  .progress-bar {
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 24px 20px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  .q-label {
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.2em;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
  }

  .choices {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .choice-btn {
    background: var(--surface);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 16px 20px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn.hover-state { border-color: rgba(226,176,74,0.5); background: rgba(226,176,74,0.08); }
  .choice-btn.correct {
    border-color: var(--correct);
    background: rgba(62,207,142,0.12);
    color: var(--correct);
    animation: correctPulse 0.4s ease;
  }
  .choice-btn.wrong {
    border-color: var(--wrong);
    background: rgba(226,74,74,0.12);
    color: var(--wrong);
  }
  .choice-btn.disabled { cursor: default; }

  @keyframes correctPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  .choice-letter {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--text-muted);
  }
  .correct .choice-letter { background: rgba(62,207,142,0.2); color: var(--correct); }
  .wrong .choice-letter { background: rgba(226,74,74,0.2); color: var(--wrong); }

  /* ===== RESULT CARD (after each question) ===== */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 400px;
    margin-top: 16px;
    animation: slideUp 0.35s ease;
  }
  .result-card.active { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-verdict {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-verdict.correct-v { color: var(--correct); }
  .result-verdict.wrong-v { color: var(--wrong); }

  .result-answer {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .result-answer strong { color: var(--accent); }

  .result-desc {
    font-size: 14px;
    line-height: 1.8;
    color: #c0c8d8;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  .btn-next {
    width: 100%;
    max-width: 400px;
    background: var(--surface2);
    border: 1.5px solid rgba(226,176,74,0.4);
    border-radius: 50px;
    padding: 14px;
    color: var(--accent);
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s;
    display: none;
    letter-spacing: 0.05em;
  }
  .btn-next.active { display: block; }
  .btn-next:active { background: rgba(226,176,74,0.1); }

  /* ===== STAGE RESULT SCREEN ===== */
  #stage-result-screen {
    justify-content: center;
    text-align: center;
    gap: 24px;
  }

  .fireworks {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: burst 1.2s ease-out forwards;
  }

  @keyframes burst {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  .stage-result-icon {
    font-size: 64px;
    animation: bounce 1s ease infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(-6px); }
    to { transform: translateY(6px); }
  }

  .stage-result-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 26px;
    color: var(--accent);
    text-shadow: 0 0 24px rgba(226,176,74,0.4);
  }

  .praise-text {
    font-size: 16px;
    color: var(--text);
    line-height: 1.7;
    max-width: 320px;
  }

  .score-cards {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 340px;
  }

  .score-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 16px 12px;
    text-align: center;
  }

  .score-card-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }

  .score-card-value {
    font-family: 'Kaisei Decol', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
  }

  .score-card-denom {
    font-size: 14px;
    color: var(--text-muted);
  }

  .avg-card {
    background: var(--surface);
    border: 1px solid rgba(74,143,226,0.3);
    border-radius: var(--radius);
    padding: 16px 24px;
    width: 100%;
    max-width: 340px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .avg-label { font-size: 13px; color: var(--text-muted); }
  .avg-value {
    font-family: 'Kaisei Decol', serif;
    font-size: 28px;
    color: var(--accent2);
    font-weight: 700;
  }

  /* ===== FINAL SCREEN ===== */
  #final-screen {
    justify-content: center;
    text-align: center;
    gap: 24px;
  }

  .final-rank {
    font-family: 'Kaisei Decol', serif;
    font-size: 22px;
    color: var(--accent);
    background: var(--surface);
    border: 2px solid var(--accent);
    border-radius: var(--radius);
    padding: 12px 32px;
    box-shadow: var(--glow);
  }

  .total-score-ring {
    width: 140px;
    height: 140px;
    position: relative;
  }

  .total-score-ring svg {
    transform: rotate(-90deg);
  }

  .total-score-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .total-score-num {
    font-family: 'Kaisei Decol', serif;
    font-size: 36px;
    color: var(--accent);
    font-weight: 700;
    line-height: 1;
  }

  .total-score-denom {
    font-size: 13px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
  <div class="title-orbit">
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-core">🔬</div>
  </div>
  <div class="title-main">偉大な科学者<br>クイズ</div>
  <div class="title-sub">SCIENTIST QUIZ</div>
  <div class="title-info">
    <div class="title-info-row"><span>ステージ数</span><span>全10ステージ</span></div>
    <div class="title-info-row"><span>問題数</span><span>全50問</span></div>
    <div class="title-info-row"><span>選択肢</span><span>4択</span></div>
    <div class="title-info-row"><span>解説</span><span>各問あり</span></div>
  </div>

  <div class="stage-select-section">
    <div class="stage-select-label">— スタートステージを選択 —</div>
    <div class="stage-grid" id="stage-grid"></div>
    <div class="stage-select-hint">ステージ <span id="selected-stage-hint">1</span> からスタート</div>
  </div>

  <button class="btn-primary" onclick="startGame()">ゲームスタート</button>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <div class="stage-info">
      <div class="stage-badge" id="stage-label">STAGE 1</div>
      <div class="score-display">スコア <span id="current-score">0</span>/<span id="current-max">0</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="question-card">
    <div class="q-label" id="q-label">QUESTION 1 / 5</div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="result-card" id="result-card">
    <div class="result-verdict" id="result-verdict"></div>
    <div class="result-answer" id="result-answer"></div>
    <div class="result-desc" id="result-desc"></div>
  </div>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">つぎへ →</button>
</div>

<!-- STAGE RESULT SCREEN -->
<div id="stage-result-screen" class="screen">
  <div class="fireworks" id="fireworks"></div>
  <div class="stage-result-icon" id="result-icon">🏆</div>
  <div class="stage-result-title" id="stage-result-title">ステージ1 クリア！</div>
  <div class="praise-text" id="praise-text"></div>
  <div class="score-cards">
    <div class="score-card">
      <div class="score-card-label">このステージ</div>
      <div><span class="score-card-value" id="stage-score-val">0</span><span class="score-card-denom">/5</span></div>
    </div>
    <div class="score-card">
      <div class="score-card-label">パーフェクト数</div>
      <div><span class="score-card-value" id="perfect-count">0</span><span class="score-card-denom">回</span></div>
    </div>
  </div>
  <div class="avg-card">
    <div class="avg-label">平均スコア</div>
    <div class="avg-value" id="avg-score-val">0.0</div>
  </div>
  <button class="btn-primary" id="next-stage-btn" onclick="nextStage()">つぎのステージへ</button>
</div>

<!-- FINAL SCREEN -->
<div id="final-screen" class="screen">
  <div class="fireworks" id="fireworks-final"></div>
  <div style="font-size:72px; animation: bounce 1s ease infinite alternate;">🎓</div>
  <div class="stage-result-title">全ステージ制覇！</div>
  <div class="total-score-ring">
    <svg width="140" height="140" viewBox="0 0 140 140">
      <circle cx="70" cy="70" r="58" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10"/>
      <circle cx="70" cy="70" r="58" fill="none" stroke="url(#grad)" stroke-width="10" stroke-linecap="round" stroke-dasharray="364.4" id="final-ring"/>
    </svg>
    <defs>
      <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#4a8fe2"/>
        <stop offset="100%" stop-color="#e2b04a"/>
      </linearGradient>
    </defs>
    <div class="total-score-text">
      <div class="total-score-num" id="total-score-num">0</div>
      <div class="total-score-denom">/ 50</div>
    </div>
  </div>
  <div class="final-rank" id="final-rank">🏆 科学博士</div>
  <div class="praise-text" id="final-praise"></div>
  <div class="avg-card">
    <div class="avg-label">全体平均スコア</div>
    <div class="avg-value" id="final-avg">0.0</div>
  </div>
  <button class="btn-primary" onclick="restartGame()">もう一度プレイ</button>
</div>

<script>
const quizData = [
  // ===== STAGE 1 =====
  {
    question: "私は万有引力の法則を発見した物理学者です。光学の分野でも重要な業績を残し、プリズムで白色光が様々な色に分解できることを示しました。イギリスのウールスソープで生まれ、ケンブリッジ大学で学びました。王立造幣局長官として偽造貨幣犯罪者の取締りも行いました。",

let currentStage = 0;
let currentQuestion = 0;
let stageScore = 0;
let totalScore = 0;
let stageScores = [];
let answered = false;
let selectedStartStage = 0;

function initStageGrid() {
  const grid = document.getElementById('stage-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const cell = document.createElement('div');
    cell.className = 'stage-cell' + (i === selectedStartStage ? ' selected' : '');
    cell.innerHTML = `<span class="stage-cell-num">${i + 1}</span><span class="stage-cell-label">STAGE</span>`;
    cell.onclick = () => selectStartStage(i);
    grid.appendChild(cell);
  }
}

function selectStartStage(idx) {
  selectedStartStage = idx;
  document.querySelectorAll('.stage-cell').forEach((c, i) => {
    c.classList.toggle('selected', i === idx);
  });
  document.getElementById('selected-stage-hint').textContent = idx + 1;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  currentStage = selectedStartStage;
  currentQuestion = 0;
  stageScore = 0;
  totalScore = 0;
  stageScores = [];
  loadQuestion();
  showScreen('quiz-screen');
}

initStageGrid();

function getQ() {
  return quizData[currentStage * 5 + currentQuestion];
}

function loadQuestion() {
  answered = false;
  const q = getQ();
  const qNum = currentQuestion + 1;
  const stageNum = currentStage + 1;

  document.getElementById('stage-label').textContent = `STAGE ${stageNum}`;
  document.getElementById('q-label').textContent = `QUESTION ${qNum} / 5`;
  document.getElementById('current-score').textContent = stageScore;
  document.getElementById('current-max').textContent = currentQuestion;
  document.getElementById('progress-fill').style.width = `${currentQuestion / 5 * 100}%`;
  document.getElementById('q-text').textContent = q.question;

  const choices = document.getElementById('choices');
  choices.innerHTML = '';

  const letters = ['A', 'B', 'C', 'D'];
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[i]}</span>${c}`;
    btn.onclick = () => selectAnswer(c, btn);
    choices.appendChild(btn);
  });

  document.getElementById('result-card').classList.remove('active');
  document.getElementById('btn-next').classList.remove('active');

  // scroll to top
  document.getElementById('quiz-screen').scrollTo(0, 0);
  window.scrollTo(0, 0);
}

function selectAnswer(choice, btn) {
  if (answered) return;
  answered = true;
  const q = getQ();
  const isCorrect = choice === q.answer;

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => {
    b.classList.add('disabled');
    b.onclick = null;
    const label = b.textContent.slice(1);
    if (label === q.answer) b.classList.add('correct');
  });

  if (isCorrect) {
    btn.classList.add('correct');
    stageScore++;
    totalScore++;
  } else {
    btn.classList.add('wrong');
  }

  const rc = document.getElementById('result-card');
  const rv = document.getElementById('result-verdict');
  const ra = document.getElementById('result-answer');
  const rd = document.getElementById('result-desc');

  rv.className = 'result-verdict ' + (isCorrect ? 'correct-v' : 'wrong-v');
  rv.innerHTML = isCorrect ? '✓ 正解！' : '✗ 不正解';
  ra.innerHTML = `正解は <strong>${q.answer}</strong>`;
  rd.textContent = q.explanation;

  rc.classList.add('active');

  const isLast = currentQuestion === 4;
  document.getElementById('btn-next').textContent = isLast ? 'ステージ結果を見る →' : 'つぎの問題へ →';
  document.getElementById('btn-next').classList.add('active');

  document.getElementById('current-score').textContent = stageScore;
  document.getElementById('current-max').textContent = currentQuestion + 1;

  setTimeout(() => {
    rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 200);
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion >= 5) {
    showStageResult();
  } else {
    loadQuestion();
  }
}

function showStageResult() {
  stageScores.push(stageScore);
  const avg = stageScores.reduce((a, b) => a + b, 0) / stageScores.length;
  const perfectCount = stageScores.filter(s => s === 5).length;
  const isLast = currentStage === 9;

  document.getElementById('stage-result-title').textContent = `ステージ${currentStage + 1} クリア！`;
  document.getElementById('stage-score-val').textContent = stageScore;
  document.getElementById('perfect-count').textContent = perfectCount;
  document.getElementById('avg-score-val').textContent = avg.toFixed(1);

  let icon = '⭐';
  let praise = '';
  if (stageScore === 5) {
    icon = '🏆';
    praise = `完璧です！全問正解とは素晴らしい！あなたの科学知識は本物です。歴史的な科学者たちもきっと喜んでいるでしょう！`;
  } else if (stageScore >= 4) {
    icon = '🌟';
    praise = `4問正解！とても優秀です！科学への深い関心と理解が伝わってきます。もう少しで完璧ですね！`;
  } else if (stageScore >= 3) {
    icon = '👏';
    praise = `3問正解！よく頑張りました！科学の歴史は奥が深いですね。着実に知識が身についています！`;
  } else if (stageScore >= 2) {
    icon = '💪';
    praise = `2問正解！まだまだこれから！科学者たちの面白いエピソードをもっと覚えていきましょう！`;
  } else {
    icon = '🔬';
    praise = `まずは1問正解できました！科学の世界への第一歩を踏み出しましたね。次のステージで挽回しましょう！`;
  }

  document.getElementById('result-icon').textContent = icon;
  document.getElementById('praise-text').textContent = praise;

  const nextBtn = document.getElementById('next-stage-btn');
  nextBtn.textContent = isLast ? '最終結果を見る 🎓' : `ステージ${currentStage + 2}へ進む →`;
  nextBtn.onclick = isLast ? showFinalResult : nextStage;

  launchFireworks('fireworks');
  showScreen('stage-result-screen');
}

function nextStage() {
  currentStage++;
  currentQuestion = 0;
  stageScore = 0;
  loadQuestion();
  showScreen('quiz-screen');
}

function showFinalResult() {
  const avg = stageScores.reduce((a, b) => a + b, 0) / stageScores.length;
  document.getElementById('total-score-num').textContent = totalScore;
  document.getElementById('final-avg').textContent = avg.toFixed(1);

  const pct = totalScore / 50;
  const dash = 364.4;
  document.getElementById('final-ring').style.strokeDashoffset = dash * (1 - pct);

  let rank, praise;
  if (totalScore >= 48) { rank = '🏆 伝説の科学博士'; praise = '驚異的なスコアです！歴史的科学者の知識では世界トップクラスといえるでしょう。ノーベル賞レベルの博識ぶりに脱帽です！'; }
  else if (totalScore >= 40) { rank = '🎓 科学大学院生'; praise = 'とても素晴らしいスコアです！科学史への深い理解と情熱が感じられます。あと一歩で伝説の称号も夢ではありません！'; }
  else if (totalScore >= 30) { rank = '🔬 科学研究者'; praise = '立派なスコアです！50問の科学者クイズでこれだけ答えられるのは相当な知識の持ち主ですよ。'; }
  else if (totalScore >= 20) { rank = '📚 科学愛好家'; praise = '半分以上の科学者を見事に当てました！科学への興味と好奇心がスコアに表れています。'; }
  else { rank = '🌱 科学入門者'; praise = '科学の世界への第一歩を踏み出しました！各問の解説を読み返して、偉大な科学者たちのエピソードを楽しんでみてください。'; }

  document.getElementById('final-rank').textContent = rank;
  document.getElementById('final-praise').textContent = praise;

  launchFireworks('fireworks-final');
  showScreen('final-screen');
}

function restartGame() {
  selectedStartStage = 0;
  initStageGrid();
  showScreen('title-screen');
}

function launchFireworks(containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const colors = ['#e2b04a', '#4a8fe2', '#e24a7a', '#3ecf8e', '#fff'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      const x = Math.random() * 100;
      const y = Math.random() * 60 + 10;
      const tx = (Math.random() - 0.5) * 200;
      const ty = (Math.random() - 0.5) * 200;
      p.style.cssText = `left:${x}%;top:${y}%;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${tx}px;--ty:${ty}px;animation-duration:${0.8+Math.random()*0.8}s;animation-delay:${Math.random()*0.4}s;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;`;
      container.appendChild(p);
    }, i * 30);
  }
}
</script>
